<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jothiram Sanjeevi | Senior AI Engineer</title>
  <meta name="description" content="Senior AI Engineer specializing in machine learning, deep learning, and artificial intelligence." />

  <style>
    /* ── FONTS (self-hosted stacks, zero external requests) ── */
    :root {
      --font-serif: 'Palatino Linotype', 'Book Antiqua', Palatino, 'Times New Roman', serif;
      --font-sans:  'Helvetica Neue', Helvetica, Arial, system-ui, sans-serif;
      --font-mono:  'SF Mono', 'Fira Code', 'Cascadia Code', Menlo, Consolas, monospace;

      /* Palette */
      --bg:         #080c12;
      --surface:    rgba(255,255,255,0.035);
      --surface-md: rgba(255,255,255,0.055);
      --border:     rgba(255,255,255,0.08);
      --border-md:  rgba(255,255,255,0.13);
      --ink:        #eef2f8;
      --ink-2:      rgba(238,242,248,0.68);
      --ink-3:      rgba(238,242,248,0.44);
      --gold:       #c9a96e;
      --gold-dim:   rgba(201,169,110,0.13);
      --gold-glow:  rgba(201,169,110,0.22);
      --teal:       #4dd9c0;
      --teal-dim:   rgba(77,217,192,0.10);

      /* Shape */
      --radius-xl: 26px;
      --radius-lg: 18px;
      --radius-md: 12px;
      --radius-sm:  8px;
      --shadow-card: 0 2px 40px rgba(0,0,0,0.45), 0 1px 0 rgba(255,255,255,0.05) inset;
      --w: 1160px;
    }

    /* ── RESET ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-sans);
      font-weight: 400;
      line-height: 1.65;
      overflow-x: hidden;
      min-height: 100vh;
    }
    a { color: inherit; text-decoration: none; }
    ul, ol { list-style: none; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; }

    /* ── AMBIENT BG ── */
    .ambient {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
    }
    .ambient::before {
      content: '';
      position: absolute;
      width: 900px; height: 700px; top: -200px; left: -200px;
      background: radial-gradient(ellipse, rgba(77,217,192,0.07) 0%, transparent 60%);
    }
    .ambient::after {
      content: '';
      position: absolute;
      width: 800px; height: 800px; top: 80px; right: -300px;
      background: radial-gradient(ellipse, rgba(201,169,110,0.08) 0%, transparent 60%);
    }

    /* ── GRAIN ── */
    .grain {
      position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.022;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 256px 256px;
    }

    /* ── SHELL ── */
    .shell {
      width: min(calc(100% - 40px), var(--w));
      margin-inline: auto;
      position: relative; z-index: 2;
    }

    /* ── TOPBAR ── */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(8,12,18,0.82);
      backdrop-filter: blur(24px) saturate(160%);
      border-bottom: 1px solid var(--border);
    }
    .topbar-inner {
      display: flex; align-items: center; justify-content: space-between;
      gap: 20px; padding: 17px 0;
    }
    .brand {
      display: flex; align-items: center; gap: 11px;
      font-family: var(--font-mono); font-size: 0.82rem;
      letter-spacing: 0.03em; color: var(--ink-2);
    }
    .brand-mark {
      width: 34px; height: 34px; border-radius: var(--radius-md);
      background: linear-gradient(135deg, var(--teal) 0%, var(--gold) 100%);
      display: grid; place-items: center;
      color: #080c12; font-family: var(--font-mono);
      font-weight: 700; font-size: 0.75rem; flex-shrink: 0;
    }
    .brand-name { color: var(--ink); font-weight: 600; letter-spacing: 0.01em; }

    .nav { display: flex; align-items: center; gap: 26px; }
    .nav a {
      font-size: 0.85rem; font-weight: 500; color: var(--ink-3);
      letter-spacing: 0.02em; transition: color 150ms ease; white-space: nowrap;
    }
    .nav a:hover { color: var(--ink); }

    /* Hamburger */
    .hamburger {
      display: none; width: 36px; height: 36px;
      flex-direction: column; justify-content: center; align-items: center; gap: 5px;
    }
    .hamburger span {
      display: block; width: 21px; height: 1.5px; background: var(--ink-2);
      transition: transform 240ms ease, opacity 200ms ease;
    }
    .hamburger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

    /* Mobile Nav */
    .nav-mobile {
      display: none; position: fixed; inset: 0; top: 70px; z-index: 99;
      background: rgba(8,12,18,0.97); backdrop-filter: blur(20px);
      flex-direction: column; align-items: center; justify-content: center; gap: 30px;
    }
    .nav-mobile.open { display: flex; }
    .nav-mobile a {
      font-size: 1.6rem; color: var(--ink-2);
      font-family: var(--font-serif); font-style: italic;
      transition: color 150ms ease;
    }
    .nav-mobile a:hover { color: var(--gold); }

    /* ── HERO ── */
    .hero { padding: 80px 0 52px; }
    .hero-grid {
      display: grid; grid-template-columns: 1.2fr 0.8fr;
      gap: 20px; align-items: stretch;
    }

    .hero-copy {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-xl); padding: 44px;
      position: relative; overflow: hidden; box-shadow: var(--shadow-card);
    }
    .hero-copy::before {
      content: ''; position: absolute;
      width: 420px; height: 420px; top: -180px; right: -180px;
      background: radial-gradient(circle, rgba(77,217,192,0.09), transparent 65%);
      pointer-events: none;
    }

    .eyebrow {
      display: inline-flex; align-items: center; gap: 9px;
      padding: 7px 14px; border-radius: 999px;
      border: 1px solid var(--border-md); background: var(--surface);
      color: var(--teal); font-family: var(--font-mono);
      font-size: 0.72rem; letter-spacing: 0.10em;
      text-transform: uppercase; margin-bottom: 22px;
    }
    .eyebrow-dot {
      width: 6px; height: 6px; border-radius: 50%; background: var(--teal);
      animation: pulse 2.2s infinite; flex-shrink: 0;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.35; transform: scale(0.72); }
    }

    .hero-name {
      font-family: var(--font-serif); font-style: italic;
      font-size: clamp(2.6rem, 6.5vw, 4.8rem);
      line-height: 1.02; letter-spacing: -0.01em;
      color: var(--ink); margin-bottom: 8px;
    }
    .hero-name-accent { color: var(--gold); }
    .hero-title {
      font-family: var(--font-mono); font-size: 0.78rem;
      color: var(--ink-3); letter-spacing: 0.10em;
      text-transform: uppercase; margin-bottom: 20px;
    }
    .hero-desc {
      font-size: 1.02rem; line-height: 1.78;
      color: var(--ink-2); max-width: 58ch; font-weight: 300;
    }

    .cta-row { display: flex; flex-wrap: wrap; gap: 11px; margin-top: 28px; }
    .btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 12px 22px; border-radius: var(--radius-md);
      font-family: var(--font-sans); font-size: 0.88rem; font-weight: 600;
      letter-spacing: 0.01em;
      transition: transform 170ms ease, box-shadow 170ms ease, background 170ms ease;
    }
    .btn:hover { transform: translateY(-2px); }
    .btn-primary {
      background: linear-gradient(135deg, var(--teal) 0%, #3cbfaa 100%);
      color: #080c12;
      box-shadow: 0 4px 24px rgba(77,217,192,0.24);
    }
    .btn-primary:hover { box-shadow: 0 8px 32px rgba(77,217,192,0.38); }
    .btn-ghost {
      background: var(--surface-md); color: var(--ink-2);
      border: 1px solid var(--border-md);
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.07); }

    .hero-stats {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 11px; margin-top: 28px;
    }
    .stat-tile {
      padding: 15px; border-radius: var(--radius-md);
      border: 1px solid var(--border); background: rgba(255,255,255,0.02);
    }
    .stat-value {
      font-family: var(--font-serif); font-size: 1.3rem;
      color: var(--ink); margin-bottom: 4px; font-style: italic;
    }
    .stat-label { font-size: 0.76rem; color: var(--ink-3); line-height: 1.4; }

    /* Hero sidebar */
    .hero-sidebar { display: flex; flex-direction: column; gap: 15px; }
    .profile-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-xl); padding: 28px;
      box-shadow: var(--shadow-card); position: relative; overflow: hidden; flex: 1;
    }
    .profile-card::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(155deg, rgba(201,169,110,0.06) 0%, rgba(77,217,192,0.05) 100%);
      pointer-events: none;
    }
    .profile-badge {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 6px 12px; border-radius: 999px;
      background: var(--gold-dim); border: 1px solid rgba(201,169,110,0.22);
      color: var(--gold); font-size: 0.72rem;
      font-family: var(--font-mono); letter-spacing: 0.04em; margin-bottom: 18px;
    }
    .avatar {
      width: 60px; height: 60px; border-radius: var(--radius-md);
      background: linear-gradient(135deg, var(--teal), var(--gold));
      display: grid; place-items: center; color: #080c12;
      font-family: var(--font-mono); font-weight: 700; font-size: 1.05rem;
      margin-bottom: 15px; box-shadow: 0 8px 28px rgba(77,217,192,0.20);
    }
    .profile-name {
      font-family: var(--font-serif); font-style: italic;
      font-size: 1.45rem; color: var(--ink); margin-bottom: 5px;
    }
    .profile-role {
      font-size: 0.76rem; color: var(--ink-3);
      font-family: var(--font-mono); letter-spacing: 0.06em; margin-bottom: 14px;
    }
    .profile-bio { font-size: 0.88rem; color: var(--ink-2); line-height: 1.72; font-weight: 300; }

    .quick-facts {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-xl); padding: 18px;
      box-shadow: var(--shadow-card); display: grid; gap: 9px;
    }
    .fact {
      display: flex; justify-content: space-between; align-items: center; gap: 12px;
      padding: 10px 13px; border-radius: var(--radius-sm);
      background: rgba(255,255,255,0.025); border: 1px solid var(--border);
    }
    .fact-label { font-size: 0.76rem; color: var(--ink-3); font-family: var(--font-mono); letter-spacing: 0.03em; white-space: nowrap; }
    .fact-value { font-size: 0.80rem; color: var(--ink-2); text-align: right; }

    /* ── SECTIONS ── */
    section { padding: 20px 0; }
    .section-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-xl); padding: 40px;
      box-shadow: var(--shadow-card); position: relative; overflow: hidden;
    }
    .section-card::before {
      content: ''; position: absolute; inset: 0;
      background:
        radial-gradient(circle at 96% 4%, rgba(201,169,110,0.05) 0%, transparent 34%),
        radial-gradient(circle at 4% 96%, rgba(77,217,192,0.04) 0%, transparent 34%);
      pointer-events: none;
    }
    .section-inner { position: relative; z-index: 1; }

    .section-kicker {
      font-family: var(--font-mono); font-size: 0.70rem;
      letter-spacing: 0.20em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 9px;
    }
    .section-title {
      font-family: var(--font-serif); font-style: italic;
      font-size: clamp(1.7rem, 3.8vw, 2.5rem); color: var(--ink);
      letter-spacing: -0.01em; line-height: 1.1; margin-bottom: 10px;
    }
    .section-title-accent { color: var(--gold); }
    .section-desc {
      font-size: 0.97rem; color: var(--ink-2); max-width: 66ch;
      line-height: 1.78; font-weight: 300; margin-bottom: 30px;
    }

    /* ── ABOUT ── */
    .two-col-grid { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 17px; }
    .panel {
      background: rgba(255,255,255,0.025); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 24px;
    }
    .panel-title {
      font-family: var(--font-serif); font-style: italic;
      font-size: 1.1rem; color: var(--ink); margin-bottom: 16px;
    }
    .bullet-list { display: grid; gap: 10px; }
    .bullet-list li {
      display: flex; align-items: flex-start; gap: 12px;
      font-size: 0.90rem; color: var(--ink-2); line-height: 1.62;
    }
    .bullet-dot {
      width: 5px; height: 5px; border-radius: 50%; background: var(--teal);
      flex-shrink: 0; margin-top: 8px;
    }
    .pill-cloud { display: flex; flex-wrap: wrap; gap: 8px; }
    .pill {
      padding: 6px 13px; border-radius: 999px;
      border: 1px solid var(--border-md); background: rgba(255,255,255,0.03);
      font-size: 0.80rem; color: var(--ink-2);
    }
    .panel-note {
      margin-top: 16px; padding: 13px 16px; border-radius: var(--radius-md);
      background: var(--gold-dim); border: 1px solid rgba(201,169,110,0.18);
      font-size: 0.84rem; color: var(--ink-2); line-height: 1.65; font-style: italic;
    }

    /* ── EXPERTISE ── */
    .four-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 15px; }
    .expertise-card {
      background: rgba(255,255,255,0.025); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 22px;
      transition: border-color 200ms ease, background 200ms ease;
    }
    .expertise-card:hover { border-color: var(--border-md); background: var(--surface-md); }
    .expertise-icon { font-size: 1.4rem; margin-bottom: 13px; display: block; }
    .expertise-title { font-family: var(--font-serif); font-style: italic; font-size: 1.02rem; color: var(--ink); margin-bottom: 8px; }
    .expertise-desc { font-size: 0.83rem; color: var(--ink-3); line-height: 1.7; }

    /* ── SERVICES ── */
    .three-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 15px; }
    .service-card {
      background: rgba(255,255,255,0.025); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 24px;
      display: flex; flex-direction: column; gap: 11px;
      transition: border-color 200ms ease;
    }
    .service-card:hover { border-color: var(--gold-glow); }
    .service-title { font-family: var(--font-serif); font-style: italic; font-size: 1.12rem; color: var(--ink); }
    .service-desc { font-size: 0.86rem; color: var(--ink-2); line-height: 1.72; flex: 1; font-weight: 300; }
    .tag-row { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag {
      padding: 5px 10px; border-radius: 999px;
      background: var(--teal-dim); border: 1px solid rgba(77,217,192,0.18);
      color: var(--teal); font-family: var(--font-mono);
      font-size: 0.68rem; letter-spacing: 0.05em;
    }

    /* ── DISCLAIMER ── */
    .disclaimer {
      display: flex; align-items: flex-start; gap: 14px;
      padding: 18px 22px; border-radius: var(--radius-lg);
      background: var(--gold-dim); border: 1px solid rgba(201,169,110,0.22);
      margin-bottom: 26px;
    }
    .disclaimer-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 2px; }
    .disclaimer-text { font-size: 0.86rem; color: var(--ink-2); line-height: 1.72; font-style: italic; }

    /* ── PROJECTS ── */
    .projects-list { display: grid; gap: 19px; }
    .project-card {
      background: rgba(255,255,255,0.025); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 28px; display: grid; gap: 20px;
      transition: border-color 200ms ease;
    }
    .project-card:hover { border-color: var(--border-md); }
    .project-top {
      display: flex; justify-content: space-between;
      align-items: flex-start; gap: 18px;
    }
    .project-tag {
      padding: 5px 12px; border-radius: 999px;
      background: var(--teal-dim); border: 1px solid rgba(77,217,192,0.18);
      color: var(--teal); font-family: var(--font-mono);
      font-size: 0.68rem; letter-spacing: 0.08em; text-transform: uppercase; white-space: nowrap;
    }
    .project-title {
      font-family: var(--font-serif); font-style: italic;
      font-size: 1.45rem; color: var(--ink); margin-bottom: 7px; letter-spacing: -0.01em;
    }
    .project-desc { font-size: 0.90rem; color: var(--ink-2); line-height: 1.72; font-weight: 300; }
    .project-two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 17px; }
    .col-label {
      font-family: var(--font-mono); font-size: 0.68rem;
      letter-spacing: 0.13em; text-transform: uppercase;
      color: var(--ink-3); margin-bottom: 11px;
    }
    .project-bullets { display: grid; gap: 8px; }
    .project-bullets li {
      padding: 10px 13px; border-radius: var(--radius-md);
      background: rgba(255,255,255,0.025); border: 1px solid var(--border);
      font-size: 0.82rem; color: var(--ink-2); line-height: 1.62;
    }
    .meta-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 9px; }
    .meta-item {
      padding: 12px 14px; border-radius: var(--radius-md);
      background: rgba(255,255,255,0.02); border: 1px solid var(--border);
    }
    .meta-label {
      font-family: var(--font-mono); font-size: 0.65rem;
      letter-spacing: 0.13em; text-transform: uppercase;
      color: var(--ink-3); margin-bottom: 4px;
    }
    .meta-value { font-size: 0.82rem; color: var(--ink); font-weight: 600; line-height: 1.4; }

    /* ── STACK ── */
    .stack-two-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 15px; }
    .stack-card {
      background: rgba(255,255,255,0.025); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 22px;
    }
    .stack-title { font-family: var(--font-serif); font-style: italic; font-size: 0.98rem; color: var(--ink); margin-bottom: 5px; }
    .stack-desc { font-size: 0.80rem; color: var(--ink-3); line-height: 1.6; margin-bottom: 14px; }
    .chip-row { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip {
      padding: 5px 12px; border-radius: 999px;
      background: rgba(255,255,255,0.03); border: 1px solid var(--border);
      font-family: var(--font-mono); font-size: 0.72rem; color: var(--ink-2);
    }

    /* ── PROCESS ── */
    .process-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 15px; }
    .process-card {
      background: rgba(255,255,255,0.025); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 22px; position: relative; overflow: hidden;
    }
    .process-num {
      font-family: var(--font-serif); font-style: italic; font-size: 3.8rem;
      color: rgba(255,255,255,0.04); line-height: 1;
      position: absolute; top: 8px; right: 14px;
      pointer-events: none; user-select: none;
    }
    .process-step { font-family: var(--font-mono); font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--teal); margin-bottom: 9px; }
    .process-title { font-family: var(--font-serif); font-style: italic; font-size: 1.1rem; color: var(--ink); margin-bottom: 9px; }
    .process-desc { font-size: 0.83rem; color: var(--ink-3); line-height: 1.66; }

    /* ── CONTACT ── */
    .contact-grid { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 17px; }
    .contact-main {
      background: rgba(255,255,255,0.025); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 28px;
      display: flex; flex-direction: column; gap: 18px;
    }
    .contact-heading {
      font-family: var(--font-serif); font-style: italic;
      font-size: 1.55rem; color: var(--ink); line-height: 1.22;
    }
    .contact-heading-accent { color: var(--gold); }
    .contact-body { font-size: 0.90rem; color: var(--ink-2); line-height: 1.76; font-weight: 300; }
    .contact-links { display: grid; gap: 9px; }
    .contact-link {
      display: flex; justify-content: space-between; align-items: center; gap: 14px;
      padding: 14px 17px; border-radius: var(--radius-md);
      background: rgba(255,255,255,0.03); border: 1px solid var(--border);
      transition: border-color 170ms ease, background 170ms ease;
    }
    .contact-link:hover { border-color: var(--border-md); background: rgba(255,255,255,0.05); }
    .contact-link-label { font-size: 0.68rem; font-family: var(--font-mono); letter-spacing: 0.11em; text-transform: uppercase; color: var(--ink-3); margin-bottom: 2px; }
    .contact-link-handle { font-size: 0.87rem; color: var(--ink); }
    .contact-link-arrow { font-size: 0.85rem; color: var(--ink-3); transition: transform 150ms ease, color 150ms ease; }
    .contact-link:hover .contact-link-arrow { transform: translate(3px,-3px); color: var(--teal); }

    .contact-aside { display: flex; flex-direction: column; gap: 14px; }
    .contact-note {

/* ── SCROLL REVEAL ── */
function initReveal() {
  const els = document.querySelectorAll('.reveal');
  if (!('IntersectionObserver' in window)) {
    els.forEach(el => el.classList.add('in-view'));
    return;
  }
  const io = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('in-view'); io.unobserve(e.target); } });
  }, { threshold: 0.06 });
  els.forEach(el => io.observe(el));
}

    btn.setAttribute('aria-expanded', String(open));

  });
  nav.querySelectorAll('a').forEach(a => {
    a.addEventListener('click', () => {
      nav.classList.remove('open');
      btn.classList.remove('open');
      btn.setAttribute('aria-expanded', 'false');
      document.body.style.overflow = '';
    });
  });
}

document.addEventListener('DOMContentLoaded', () => {
  renderHero();
  renderAbout();
  renderExpertise();
  renderServices();
  renderProjects();
  renderStack();
  renderProcess();
  renderContact();
  renderFooter();
  initReveal();
  initNav();
});
</script>
